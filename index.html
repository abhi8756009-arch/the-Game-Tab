<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAB GAMEPAD - Luxury Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Pro Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for Luxury Vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Luxury Font Defaults */
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #e2e8f0; }
        .font-luxury { font-family: 'Cinzel', serif; }

        /* Disable double tap zoom */
        touch-action: manipulation;

        /* Deep Luxury Animated Background */
        .luxury-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background: radial-gradient(circle at 15% 50%, rgba(30, 27, 75, 0.4), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(67, 56, 202, 0.2), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(180, 83, 9, 0.15), transparent 50%);
            background-color: #09090b;
        }
        
        .luxury-bg::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        /* Glassmorphism & Gold Theme Cards */
        .glass-card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Card States */
        .card-idle { border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-active { border: 1px solid rgba(212, 175, 55, 0.5); box-shadow: 0 0 20px rgba(212, 175, 55, 0.15), inset 0 0 10px rgba(212, 175, 55, 0.05); }
        .card-paused { border: 1px solid rgba(56, 189, 248, 0.6); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .card-warning { border: 1px solid rgba(234, 179, 8, 0.8); animation: warning-glow 1.5s infinite alternate; }
        .card-danger { border: 1px solid rgba(239, 68, 68, 0.9); animation: danger-glow 0.8s infinite alternate; }

        @keyframes warning-glow {
            0% { box-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
            100% { box-shadow: 0 0 25px rgba(234, 179, 8, 0.6), inset 0 0 10px rgba(234, 179, 8, 0.2); }
        }
        @keyframes danger-glow {
            0% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transform: scale(1); }
            100% { box-shadow: 0 0 35px rgba(239, 68, 68, 0.8), inset 0 0 15px rgba(239, 68, 68, 0.4); transform: scale(1.01); }
        }

        /* Microphone Pulse */
        .mic-active-ring {
            position: absolute; border-radius: 50%; border: 2px solid #22c55e;
            width: 100%; height: 100%; top: 0; left: 0; animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping-slow { 75%, 100% { transform: scale(2); opacity: 0; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #b38728; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col select-none">
    
    <!-- Animated Luxury Background -->
    <div class="luxury-bg"></div>

    <!-- Top Luxury Header -->
    <header class="glass-card sticky top-0 z-50 px-4 py-3 shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-b border-white/10">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <!-- Brand -->
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full border border-yellow-500/50 flex items-center justify-center bg-black/50 shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                    <i class="fa-solid fa-gamepad text-2xl gold-text"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-luxury font-black tracking-widest gold-text drop-shadow-[0_0_10px_rgba(212,175,55,0.3)]">
                        TAB GAMEPAD
                    </h1>
                    <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-0.5">
                        VIP Gaming Lounge Server
                    </p>
                </div>
            </div>

            <!-- Voice AI & Controls -->
            <div class="flex items-center gap-3">
                <!-- AI Milo Mic Button -->
                <button id="aiMicBtn" onclick="toggleContinuousMic()" class="relative bg-black/60 hover:bg-black text-[10px] px-4 py-2.5 rounded-full font-bold uppercase tracking-wider flex items-center gap-2 transition-all border border-slate-700 shadow-lg">
                    <div id="aiMicRing" class="hidden mic-active-ring"></div>
                    <i id="aiMicIcon" class="fa-solid fa-microphone-slash text-slate-500"></i>
                    <span id="aiMicTxt" class="text-slate-400">Milo Auto-Voice: OFF</span>
                </button>

                <button onclick="openAddScreenModal()" class="bg-gradient-to-r from-yellow-600 to-amber-500 text-black hover:from-yellow-500 hover:to-amber-400 text-[10px] px-3.5 py-2.5 rounded-full font-black uppercase tracking-wider flex items-center gap-1.5 shadow-[0_0_15px_rgba(245,158,11,0.3)] active:scale-95 transition-all">
                    <i class="fa-solid fa-plus"></i> New
                </button>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="max-w-7xl w-full mx-auto p-4 flex-grow pb-28">
        
        <!-- Live Status HUD -->
        <section class="grid grid-cols-3 gap-3 mb-8">
            <div class="glass-card p-4 rounded-2xl text-center border-t border-white/5 relative overflow-hidden group">
                <i class="fa-solid fa-play absolute -right-3 -top-3 text-4xl text-green-500/5 group-hover:text-green-500/10 transition-all"></i>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Active Consoles</p>
                <h3 class="text-2xl font-luxury font-black text-green-400 mt-1" id="activeCounter">0</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-t border-white/5 relative overflow-hidden group">
                <i class="fa-solid fa-hourglass-half absolute -right-3 -top-3 text-4xl text-yellow-500/5 group-hover:text-yellow-500/10 transition-all"></i>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">10 Min Alerts</p>
                <h3 class="text-2xl font-luxury font-black text-yellow-400 mt-1" id="warningCounter">0</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-t border-white/5 relative overflow-hidden group">
                <i class="fa-solid fa-radiation absolute -right-3 -top-3 text-4xl text-red-500/5 group-hover:text-red-500/10 transition-all"></i>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Time Completed</p>
                <h3 class="text-2xl font-luxury font-black text-red-500 mt-1" id="alarmCounter">0</h3>
            </div>
        </section>

        <!-- Dynamic Workspaces -->
        <section class="mb-10">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xs font-black text-slate-200 tracking-widest uppercase flex items-center gap-2">
                    <i class="fa-solid fa-crown gold-text"></i> VIP Stations
                </h2>
                <div class="flex items-center gap-2 text-[9px] text-slate-500 font-bold tracking-widest uppercase">
                    <i class="fa-solid fa-circle text-green-500 text-[6px] animate-pulse"></i> Zero-Lag Engine Running
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5" id="screensWorkspace">
                <!-- Screens will render here via JS -->
            </div>
        </section>
    </main>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 left-0 right-0 glass-card border-t border-white/10 p-3.5 flex flex-col sm:flex-row justify-between items-center gap-3.5 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
        <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 shadow-[0_0_5px_#eab308]"></span>
            <div class="text-[9px] font-black uppercase text-slate-400 tracking-wider">
                <span class="gold-text font-luxury">TAB GAMEPAD</span> ROYAL EDITION
            </div>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
            <button onclick="clearLogs()" class="text-[9px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-widest transition-all">
                Reset History
            </button>
            <button onclick="muteAllAlarms()" class="bg-gradient-to-r from-red-900 to-red-700 hover:from-red-800 hover:to-red-600 text-white text-[10px] px-5 py-2.5 rounded-full font-black uppercase tracking-widest border border-red-500/50 shadow-[0_0_15px_rgba(220,38,38,0.3)] active:scale-95 transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-volume-xmark"></i> Mute All
            </button>
        </div>
    </div>

    <!-- Toast / Alerts System -->
    <div id="toastContainer" class="fixed bottom-24 right-4 left-4 sm:left-auto sm:w-96 z-50 flex flex-col gap-3"></div>

    <!-- Modals Background Blur -->
    <div id="modalOverlay" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4 transition-all opacity-0">
        
        <!-- Add Screen Modal -->
        <div id="addScreenModal" class="hidden w-full max-w-sm glass-card border border-yellow-500/30 rounded-2xl p-6 relative shadow-[0_0_40px_rgba(212,175,55,0.15)] transform scale-95 transition-transform">
            <button onclick="closeModals()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-all text-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-md font-luxury font-black gold-text mb-4 uppercase tracking-wider text-center">
                Add New Station
            </h3>
            
            <form onsubmit="handleAddNewScreen(event)" class="space-y-4">
                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Screen Name / ID</label>
                    <input type="text" id="addScreenName" placeholder="E.g. S6, VIP-1" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:border-yellow-500/50 transition-all placeholder:text-slate-600" required>
                </div>
                <div class="pt-3">
                    <button type="submit" class="w-full bg-gradient-to-r from-yellow-600 to-amber-500 text-black py-3 rounded-xl font-black uppercase tracking-widest shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-all">Confirm Addition</button>
                </div>
            </form>
        </div>

        <!-- Custom Duration Modal -->
        <div id="customTimeModal" class="hidden w-full max-w-sm glass-card border border-purple-500/30 rounded-2xl p-6 relative shadow-[0_0_40px_rgba(168,85,247,0.15)] transform scale-95 transition-transform">
            <button onclick="closeModals()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-all text-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-md font-luxury font-black text-purple-400 mb-4 uppercase tracking-wider text-center">
                Custom Duration Setup
            </h3>
            
            <form onsubmit="handleCustomTimeStart(event)" class="space-y-4">
                <input type="hidden" id="customModalSeatId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Hours</label>
                        <input type="number" id="customHours" value="1" min="0" max="24" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:border-purple-500/50 transition-all text-center">
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Minutes</label>
                        <input type="number" id="customMinutes" value="0" min="0" max="59" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:border-purple-500/50 transition-all text-center">
                    </div>
                </div>
                <div class="pt-3">
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-500 text-white py-3 rounded-xl font-black uppercase tracking-widest shadow-[0_0_15px_rgba(139,92,246,0.3)] active:scale-95 transition-all">Start Game</button>
                </div>
            </form>
        </div>

    </div>

    <!-- MAIN JAVASCRIPT APP LOGIC -->
    <script>
        let seats = [];
        let logs = [];
        let universalAudioContext = null;
        let activeSoundOscillators = {};

        // Voice AI Variables
        let speechRecognition = null;
        let isVoiceListening = false;
        let autoRestartVoice = false;

        window.onload = function() {
            initApp();
            initVoiceAI();
        }

        function initApp() {
            const savedSeats = localStorage.getItem('gt_premium_seats');
            if (savedSeats) {
                seats = JSON.parse(savedSeats);
                seats.forEach(s => {
                    if (s.isPaused === undefined) s.isPaused = false;
                    if (s.remainingMs === undefined) s.remainingMs = 0;
                });
            } else {
                seats = [
                    { id: 'S1', name: 'S1', isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 },
                    { id: 'S2', name: 'S2', isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 },
                    { id: 'S3', name: 'S3', isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 },
                    { id: 'S4', name: 'S4', isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 },
                    { id: 'S5', name: 'S5', isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 }
                ];
                saveState();
            }

            setInterval(gameTimerTick, 1000);
            document.addEventListener("visibilitychange", function() {
                if (document.visibilityState === 'visible') gameTimerTick();
            });

            renderWorkspace();
            updateStatsSummary();
        }

        function getSharedAudioContext() {
            if (!universalAudioContext) universalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (universalAudioContext.state === 'suspended') universalAudioContext.resume();
            return universalAudioContext;
        }

        function saveState() {
            localStorage.setItem('gt_premium_seats', JSON.stringify(seats));
        }

        function triggerMobileVibration(pattern) {
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                try { navigator.vibrate(pattern); } catch (e) {}
            }
        }

        /* ------------------------------------------------------------
           VOICE COMMAND AI (MILO) - SMART HINGLISH PARSER
        ------------------------------------------------------------ */
        function initVoiceAI() {
            const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognitionAPI) {
                speechRecognition = new SpeechRecognitionAPI();
                speechRecognition.continuous = true;
                speechRecognition.interimResults = false;
                speechRecognition.lang = 'hi-IN'; // Handles English and Hindi accurately in India

                speechRecognition.onresult = (event) => {
                    const lastResultIndex = event.results.length - 1;
                    let transcript = event.results[lastResultIndex][0].transcript.toLowerCase().trim();
                    console.log("🗣️ Voice Heard:", transcript);
                    showToast(`🗣️ AI Heard: "${transcript}"`, "info"); // User ko dikhane ke liye ki AI ne kya suna
                    parseVoiceCommand(transcript);
                };

                speechRecognition.onerror = (event) => {
                    console.warn("Speech Recognition Error:", event.error);
                    if (event.error === 'not-allowed') {
                        showToast("⚠️ Mic permission denied! Browser settings me ja kar Microphone Allow karein.", "danger");
                        isVoiceListening = false;
                        autoRestartVoice = false;
                        updateVoiceUIIcon(false);
                    }
                };

                speechRecognition.onend = () => {
                    if (autoRestartVoice) {
                        try { speechRecognition.start(); } catch(e){} // Restart to keep continuous listening
                    } else {
                        updateVoiceUIIcon(false);
                    }
                };
            } else {
                document.getElementById('aiMicBtn').style.display = 'none';
            }
        }

        function toggleContinuousMic() {
            if (!speechRecognition) {
                showToast("Aapka browser Voice Recognition support nahi karta.", "danger");
                return;
            }

            if (isVoiceListening) {
                // Turn OFF
                isVoiceListening = false;
                autoRestartVoice = false;
                speechRecognition.stop();
                updateVoiceUIIcon(false);
                showToast("🎙️ Milo Auto-Voice <b>OFF</b> kar di gayi hai.", "info");
            } else {
                // Turn ON
                isVoiceListening = true;
                autoRestartVoice = true;
                getSharedAudioContext(); // Pre-warm audio engine via user gesture
                try { speechRecognition.start(); } catch(e){}
                updateVoiceUIIcon(true);
                showToast("🎙️ Milo Auto-Voice <b>ON</b>. Ab aap dur se phone ko command de sakte hain. E.g. 'S1 chalu karo 2 ghante ke liye'", "success");
            }
        }

        function updateVoiceUIIcon(isActive) {
            const icon = document.getElementById('aiMicIcon');
            const txt = document.getElementById('aiMicTxt');
            const ring = document.getElementById('aiMicRing');
            const btn = document.getElementById('aiMicBtn');

            if (isActive) {
                icon.className = "fa-solid fa-microphone text-green-400 animate-pulse";
                txt.innerHTML = "Milo: Listening...";
                txt.className = "text-green-400";
                ring.classList.remove('hidden');
                btn.className = "relative bg-black text-[10px] px-4 py-2.5 rounded-full font-bold uppercase tracking-wider flex items-center gap-2 transition-all border border-green-500/50 shadow-[0_0_15px_rgba(34,197,94,0.2)]";
            } else {
                icon.className = "fa-solid fa-microphone-slash text-slate-500";
                txt.innerHTML = "Milo Auto-Voice: OFF";
                txt.className = "text-slate-400";
                ring.classList.add('hidden');
                btn.className = "relative bg-black/60 hover:bg-black text-[10px] px-4 py-2.5 rounded-full font-bold uppercase tracking-wider flex items-center gap-2 transition-all border border-slate-700 shadow-lg";
            }
        }

        function parseVoiceCommand(text) {
            // Mute Command Detection
            if (text.includes('mute') || text.includes('band karo') && text.includes('alarm') || text.includes('shant')) {
                muteAllAlarms();
                playSiriConfirmSound();
                return;
            }

            // Target Seat Finder Logic
            let targetSeat = null;
            seats.forEach(s => {
                const numericPart = s.name.replace(/\D/g, ''); 
                
                // Smart phonetic dictionary so it catches bad pronunciation
                const matchers = [
                    s.name.toLowerCase(), 
                    `s ${numericPart}`, `s${numericPart}`, `एस ${numericPart}`, 
                    `ace ${numericPart}`, `seat ${numericPart}`, `screen ${numericPart}`, 
                    `station ${numericPart}`, `yes ${numericPart}`, `is ${numericPart}`, `as ${numericPart}`
                ];
                
                if (matchers.some(m => text.includes(m))) {
                    targetSeat = s.id;
                }
            });

            if (!targetSeat) return; // Ignore irrelevant conversations

            // Action Finder
            let action = null;
            if (text.includes('start') || text.includes('shuru') || text.includes('chalu') || text.includes('set') || text.includes('laga')) action = 'start';
            else if (text.includes('stop') || text.includes('khatam') || text.includes('band')) action = 'stop';
            else if (text.includes('pause') || text.includes('rok')) action = 'pause';
            else if (text.includes('resume') || text.includes('wapas') || text.includes('continue')) action = 'resume';

            // Hours Parser (Added 30 minutes support)
            let hours = 1;
            if (text.match(/30\s*min/i) || text.match(/aadha/i) || text.match(/half/i) || text.match(/tis min/i) || text.match(/तीस मिनट/i)) hours = 0.5;
            else if (text.match(/2\s*(hour|ghant|घंट)/i) || text.match(/do\s*ghant|two\s*hour/i)) hours = 2;
            else if (text.match(/3\s*(hour|ghant|घंट)/i) || text.match(/teen\s*ghant|three\s*hour/i)) hours = 3;
            else if (text.match(/4\s*(hour|ghant|घंट)/i) || text.match(/char\s*ghant|four\s*hour/i)) hours = 4;

            // Execute mapped action
            let commandSuccess = false;
            const seatObj = seats.find(s => s.id === targetSeat);

            if (action === 'start') {
                if (!seatObj.isRunning) { quickStartSeat(targetSeat, hours); commandSuccess = true; }
                else { showToast(`⚠️ I heard Start, but ${seatObj.name} is already running!`, "warning"); }
            } 
            else if (action === 'stop' && seatObj.isRunning) {
                stopSeatSession(targetSeat, true); commandSuccess = true;
            } 
            else if (action === 'pause' && seatObj.isRunning && !seatObj.isPaused) {
                pauseSeatSession(targetSeat); commandSuccess = true;
            } 
            else if (action === 'resume' && seatObj.isPaused) {
                resumeSeatSession(targetSeat); commandSuccess = true;
            }

            if (commandSuccess) playSiriConfirmSound();
        }

        // Soft blip to let user know voice command worked
        function playSiriConfirmSound() {
            try {
                const ctx = getSharedAudioContext();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }


        /* ------------------------------------------------------------
           ALARM ENGINE & AUDIO
        ------------------------------------------------------------ */
        function startAudioAlert(seatId, type) {
            stopAudioAlert(seatId);
            try {
                const ctx = getSharedAudioContext();
                if (type === 'warning') {
                    let interval = setInterval(() => {
                        if (!activeSoundOscillators[seatId]) return clearInterval(interval);
                        triggerMobileVibration([100, 50, 100]);
                        let osc = ctx.createOscillator(); let gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.frequency.setValueAtTime(880, ctx.currentTime);
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                        osc.start(); osc.stop(ctx.currentTime + 0.2);
                    }, 3000);
                    activeSoundOscillators[seatId] = { interval };
                } 
                else if (type === 'danger') {
                    let interval = setInterval(() => {
                        if (!activeSoundOscillators[seatId]) return clearInterval(interval);
                        triggerMobileVibration([300, 100, 300, 100, 300]);
                        for (let b = 0; b < 3; b++) {
                            setTimeout(() => {
                                if (!activeSoundOscillators[seatId]) return;
                                let osc = ctx.createOscillator(); let gain = ctx.createGain();
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.type = 'sawtooth';
                                osc.frequency.setValueAtTime(160, ctx.currentTime);
                                osc.frequency.exponentialRampToValueAtTime(45, ctx.currentTime + 0.4); 
                                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                                osc.start(); osc.stop(ctx.currentTime + 0.4);
                            }, b * 350);
                        }
                    }, 1800);
                    activeSoundOscillators[seatId] = { interval };
                }
            } catch (e) {}
        }

        function stopAudioAlert(seatId) {
            if (activeSoundOscillators[seatId]) {
                clearInterval(activeSoundOscillators[seatId].interval);
                delete activeSoundOscillators[seatId];
            }
        }

        function acknowledgeAlarm(seatId) {
            const seat = seats.find(s => s.id === seatId);
            if (!seat) return;
            stopAudioAlert(seatId);
            const now = Date.now();
            const elapsedMinutes = Math.floor((now - seat.startTime) / 60000);
            seat.acknowledgedMilestones[elapsedMinutes] = true;
            const warningMarker = (seat.targetHours * 60) - 10;
            if (Math.abs(elapsedMinutes - warningMarker) <= 3) seat.acknowledgedMilestones[warningMarker] = true;
            seat.alarmState = 'none';
            saveState();
            renderWorkspaceCard(seat);
            updateStatsSummary();
            showToast(`🔔 Alarm muted for <b>${seat.name}</b>.`, "success");
        }

        function muteAllAlarms() {
            seats.forEach(seat => { if (seat.alarmState !== 'none') acknowledgeAlarm(seat.id); });
            showToast("🔇 Sabhi alarms successfully mute kar diye gaye hain.", "info");
        }


        /* ------------------------------------------------------------
           UI RENDER ENGINE
        ------------------------------------------------------------ */
        function renderWorkspace() {
            const container = document.getElementById('screensWorkspace');
            container.innerHTML = '';
            seats.forEach(seat => {
                const card = document.createElement('div');
                card.id = `seat-card-${seat.id}`;
                container.appendChild(card);
                renderWorkspaceCard(seat);
            });
        }

        function renderWorkspaceCard(seat) {
            const cardEl = document.getElementById(`seat-card-${seat.id}`);
            if (!cardEl) return;

            let borderClass = "card-idle";
            let headerColor = "text-slate-400";
            
            if (seat.isRunning) {
                if (seat.isPaused) {
                    borderClass = "card-paused";
                    headerColor = "text-blue-400 font-extrabold drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]";
                } else if (seat.alarmState === 'danger') {
                    borderClass = "card-danger";
                    headerColor = "text-red-400 font-black drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]";
                } else if (seat.alarmState === 'warning') {
                    borderClass = "card-warning";
                    headerColor = "text-yellow-400 font-black drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]";
                } else {
                    borderClass = "card-active";
                    headerColor = "gold-text font-extrabold";
                }
            }

            let badgeHTML = `<span class="text-[8px] font-black bg-white/5 text-slate-500 px-2.5 py-1 rounded-full border border-white/10 uppercase tracking-widest">Idle</span>`;
            if (seat.isRunning) {
                if (seat.isPaused) badgeHTML = `<span class="text-[8px] font-black bg-blue-500/20 text-blue-300 px-2.5 py-1 rounded-full border border-blue-500/30 uppercase tracking-widest flex items-center gap-1.5"><i class="fa-solid fa-pause animate-pulse"></i> Paused</span>`;
                else if (seat.alarmState === 'danger') badgeHTML = `<span class="text-[8px] font-black bg-red-500/20 text-red-300 px-2.5 py-1 rounded-full border border-red-500/30 uppercase tracking-widest flex items-center gap-1.5"><i class="fa-solid fa-bolt animate-spin text-red-500"></i> Time Up</span>`;
                else if (seat.alarmState === 'warning') badgeHTML = `<span class="text-[8px] font-black bg-yellow-500/20 text-yellow-300 px-2.5 py-1 rounded-full border border-yellow-500/30 uppercase tracking-widest flex items-center gap-1.5"><i class="fa-solid fa-hourglass-half animate-bounce"></i> 10m Left</span>`;
                else badgeHTML = `<span class="text-[8px] font-black bg-green-500/10 text-green-400 px-2.5 py-1 rounded-full border border-green-500/30 uppercase tracking-widest">Active</span>`;
            }

            let bodyHTML = "";
            if (!seat.isRunning) {
                bodyHTML = `
                    <div class="my-3">
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="quickStartSeat('${seat.id}', 0.5)" class="bg-white/5 hover:bg-white/10 active:scale-95 text-[10px] text-white py-3.5 rounded-xl font-bold transition-all border border-white/10">30 Min</button>
                            <button onclick="quickStartSeat('${seat.id}', 1)" class="bg-white/5 hover:bg-white/10 active:scale-95 text-[10px] text-white py-3.5 rounded-xl font-bold transition-all border border-white/10">1 Hour</button>
                            <button onclick="quickStartSeat('${seat.id}', 2)" class="bg-white/5 hover:bg-white/10 active:scale-95 text-[10px] text-white py-3.5 rounded-xl font-bold transition-all border border-white/10">2 Hours</button>
                        </div>
                        <button onclick="openCustomModal('${seat.id}')" class="w-full mt-2.5 bg-transparent hover:bg-white/5 text-[9px] text-slate-400 hover:text-white py-2.5 rounded-xl transition-all font-bold uppercase tracking-widest">
                            <i class="fa-solid fa-sliders text-yellow-600"></i> Custom Setup
                        </button>
                    </div>
                `;
            } else {
                const now = Date.now();
                const timeLeft = seat.isPaused ? seat.remainingMs : Math.max(0, seat.endTime - now);
                const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                const formattedTimer = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                let hourTabsHTML = "";
                [0.5, 1, 2, 3].forEach(hr => {
                    const isCurrentTarget = seat.targetHours === hr;
                    let btnStyle = "bg-transparent text-slate-500 border-white/10 hover:text-white";
                    if (isCurrentTarget) {
                        btnStyle = seat.isPaused ? "bg-blue-600/20 text-blue-400 border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]" : "bg-yellow-600/20 gold-text border-yellow-500/50 shadow-[0_0_15px_rgba(212,175,55,0.2)]";
                    }
                    const label = hr === 0.5 ? "30m" : `${hr}H`;
                    hourTabsHTML += `<button onclick="changeTargetHour('${seat.id}', ${hr})" class="py-1 rounded border text-[10px] font-bold transition-all ${btnStyle}">${label}</button>`;
                });

                bodyHTML = `
                    <div class="my-2 flex flex-col justify-between flex-grow">
                        <div class="bg-black/40 rounded-xl p-3 text-center border border-white/5 shadow-inner relative">
                            <div class="text-3xl font-luxury font-black tracking-widest ${seat.isPaused ? 'text-blue-400' : 'gold-text'} drop-shadow-md" id="raw-timer-${seat.id}">${formattedTimer}</div>
                            <div class="text-[7px] font-black text-slate-500 uppercase tracking-widest mt-1.5 pt-1.5 border-t border-white/5">
                                Set Target: ${seat.targetHours === 0.5 ? '30m' : seat.targetHours + 'H'}
                            </div>
                        </div>

                        <div class="mt-3">
                            <div class="grid grid-cols-4 gap-1.5">${hourTabsHTML}</div>
                        </div>

                        ${seat.alarmState !== 'none' ? `
                            <div class="mt-3">
                                <button onclick="acknowledgeAlarm('${seat.id}')" class="w-full bg-gradient-to-r from-red-800 to-red-600 text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all">
                                    <i class="fa-solid fa-bell-slash"></i> Mute Alarm
                                </button>
                            </div>
                        ` : ''}

                        <div class="mt-3 flex gap-2">
                            ${seat.isPaused ? `
                                <button onclick="resumeSeatSession('${seat.id}')" class="w-1/2 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/30 text-blue-300 text-[9px] py-2 rounded-xl font-bold uppercase tracking-widest flex items-center justify-center gap-1.5 transition-all">
                                    <i class="fa-solid fa-play animate-pulse"></i> Resume
                                </button>
                            ` : `
                                <button onclick="pauseSeatSession('${seat.id}')" class="w-1/2 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 text-[9px] py-2 rounded-xl font-bold uppercase tracking-widest flex items-center justify-center gap-1.5 transition-all">
                                    <i class="fa-solid fa-pause"></i> Pause
                                </button>
                            `}
                            <button onclick="stopSeatSession('${seat.id}')" class="w-1/2 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 text-[9px] py-2 rounded-xl font-bold uppercase tracking-widest transition-all">
                                <i class="fa-solid fa-power-off"></i> Stop
                            </button>
                        </div>
                    </div>
                `;
            }

            cardEl.className = `${borderClass} glass-card p-5 rounded-[1.25rem] relative flex flex-col justify-between min-h-[240px] transition-all`;
            cardEl.innerHTML = `
                <div class="flex justify-between items-center pb-3 border-b border-white/10">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-crown text-[10px] ${seat.isPaused ? 'text-blue-500 opacity-50' : 'text-yellow-600'}"></i>
                        <span class="text-xl font-luxury font-black uppercase ${headerColor} tracking-widest">${seat.name}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        ${badgeHTML}
                        ${!['S1','S2','S3','S4','S5'].includes(seat.id) ? `<button onclick="deleteCustomScreen('${seat.id}')" class="text-slate-600 hover:text-red-500 text-[10px]"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                    </div>
                </div>
                <div class="flex-grow flex flex-col justify-between mt-2">${bodyHTML}</div>
            `;
        }

        /* ------------------------------------------------------------
           TICKER & ACTIONS LOGIC
        ------------------------------------------------------------ */
        function gameTimerTick() {
            const now = Date.now();
            let stateModified = false;

            seats.forEach(seat => {
                if (seat.isRunning) {
                    if (seat.isPaused) {
                        const timerEl = document.getElementById(`raw-timer-${seat.id}`);
                        if (timerEl) {
                            const tl = seat.remainingMs;
                            const h = Math.floor((tl % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const m = Math.floor((tl % (1000 * 60 * 60)) / (1000 * 60));
                            const s = Math.floor((tl % (1000 * 60)) / 1000);
                            timerEl.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                        }
                        return;
                    }

                    const elapsedMins = Math.floor((now - seat.startTime) / 60000);
                    const limit = seat.initialDuration;
                    const warningMark = limit - 10;
                    
                    if (elapsedMins >= warningMark && elapsedMins < limit) {
                        if (!seat.acknowledgedMilestones[warningMark] && seat.alarmState !== 'warning') {
                            seat.alarmState = 'warning'; stateModified = true;
                            startAudioAlert(seat.id, 'warning');
                            showToast(`⚠️ Warning! ${seat.name} ka time 10 min bacha hai.`, "warning");
                        }
                    }

                    if (elapsedMins >= limit) {
                        if (!seat.acknowledgedMilestones[limit] && seat.alarmState !== 'danger') {
                            seat.alarmState = 'danger'; stateModified = true;
                            startAudioAlert(seat.id, 'danger');
                            showToast(`🚨 TIME OVER! ${seat.name} game khatam!`, "danger");
                        }
                    }

                    const timerEl = document.getElementById(`raw-timer-${seat.id}`);
                    if (timerEl) {
                        const tl = Math.max(0, seat.endTime - now);
                        const h = Math.floor((tl % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((tl % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((tl % (1000 * 60)) / 1000);
                        timerEl.innerText = tl <= 0 ? "TIME UP" : `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                        
                        if (tl <= 0) timerEl.className = "text-3xl font-luxury font-black tracking-widest text-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]";
                        else if (tl <= 600000) timerEl.className = "text-3xl font-luxury font-black tracking-widest text-yellow-400 drop-shadow-[0_0_10px_rgba(234,179,8,0.3)]";
                        else timerEl.className = "text-3xl font-luxury font-black tracking-widest gold-text drop-shadow-[0_0_5px_rgba(212,175,55,0.2)]";
                    }
                }
            });

            if (stateModified) { saveState(); renderWorkspace(); updateStatsSummary(); }
        }

        // Custom Modal Logic
        function openModals(modalId) {
            document.getElementById('modalOverlay').classList.remove('hidden');
            // small delay for transition
            setTimeout(() => {
                document.getElementById('modalOverlay').classList.remove('opacity-0');
                document.getElementById(modalId).classList.remove('hidden');
                document.getElementById(modalId).classList.remove('scale-95');
            }, 10);
        }

        function closeModals() {
            document.getElementById('modalOverlay').classList.add('opacity-0');
            document.getElementById('addScreenModal').classList.add('scale-95');
            document.getElementById('customTimeModal').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('modalOverlay').classList.add('hidden');
                document.getElementById('addScreenModal').classList.add('hidden');
                document.getElementById('customTimeModal').classList.add('hidden');
            }, 300);
        }

        function openAddScreenModal() { openModals('addScreenModal'); document.getElementById('addScreenName').focus(); }
        function openCustomModal(seatId) { 
            const seat = seats.find(s => s.id === seatId); if(!seat) return;
            document.getElementById('customModalSeatId').value = seatId;
            openModals('customTimeModal'); 
        }

        function handleAddNewScreen(e) {
            e.preventDefault();
            const name = document.getElementById('addScreenName').value.trim().toUpperCase();
            if (!name) return;
            if (seats.some(s => s.name === name)) return showToast(`${name} pehle se added hai!`, "danger");

            seats.push({ id: 'Seat-'+Date.now(), name: name, isRunning: false, startTime: null, endTime: null, targetHours: 1, initialDuration: 60, alarmState: 'none', acknowledgedMilestones: {}, isPaused: false, remainingMs: 0 });
            saveState(); renderWorkspace(); updateStatsSummary(); closeModals();
            document.getElementById('addScreenName').value = '';
            showToast(`🎉 ${name} screen VIP lounge me jodh di gayi hai.`, "success");
        }

        function deleteCustomScreen(seatId) {
            if (confirm("Kya sach me is screen ko delete karein?")) {
                stopAudioAlert(seatId); seats = seats.filter(s => s.id !== seatId);
                saveState(); renderWorkspace(); updateStatsSummary();
            }
        }

        function quickStartSeat(seatId, hours) {
            const seat = seats.find(s => s.id === seatId); if (!seat) return;
            seat.isRunning = true; seat.startTime = Date.now();
            seat.initialDuration = hours * 60;
            seat.endTime = seat.startTime + (seat.initialDuration * 60000);
            seat.targetHours = hours; seat.alarmState = 'none'; seat.acknowledgedMilestones = {}; seat.isPaused = false; seat.remainingMs = seat.initialDuration * 60000;
            saveState(); renderWorkspaceCard(seat); updateStatsSummary();
            triggerMobileVibration([150, 50, 150]); showToast(`▶️ ${seat.name} chalu ho gaya (${hours} Hr).`, "success");
        }

        function changeTargetHour(seatId, newHours) {
            const seat = seats.find(s => s.id === seatId); if (!seat || !seat.isRunning) return;
            stopAudioAlert(seatId);
            seat.targetHours = newHours; seat.initialDuration = newHours * 60;
            seat.endTime = seat.startTime + (seat.initialDuration * 60000);
            seat.alarmState = 'none'; seat.acknowledgedMilestones = {};
            seat.remainingMs = Math.max(0, seat.endTime - Date.now());
            saveState(); renderWorkspaceCard(seat); updateStatsSummary();
        }

        function handleCustomTimeStart(e) {
            e.preventDefault();
            const id = document.getElementById('customModalSeatId').value;
            const h = parseInt(document.getElementById('customHours').value) || 0;
            const m = parseInt(document.getElementById('customMinutes').value) || 0;
            const mins = (h * 60) + m;
            if (mins <= 0) return showToast("Time kam se kam 1 min hona chahiye.", "warning");

            const seat = seats.find(s => s.id === id);
            if (seat) {
                seat.isRunning = true; seat.startTime = Date.now();
                seat.initialDuration = mins; seat.endTime = seat.startTime + (mins * 60000);
                seat.targetHours = Math.ceil(mins/60); seat.alarmState = 'none'; seat.acknowledgedMilestones = {}; seat.isPaused = false; seat.remainingMs = mins * 60000;
                saveState(); renderWorkspaceCard(seat); updateStatsSummary(); closeModals();
            }
        }

        function pauseSeatSession(seatId) {
            const seat = seats.find(s => s.id === seatId); if (!seat || !seat.isRunning || seat.isPaused) return;
            stopAudioAlert(seatId);
            seat.remainingMs = Math.max(0, seat.endTime - Date.now());
            seat.isPaused = true; seat.alarmState = 'none';
            saveState(); renderWorkspaceCard(seat); updateStatsSummary(); triggerMobileVibration([100]);
        }

        function resumeSeatSession(seatId) {
            const seat = seats.find(s => s.id === seatId); if (!seat || !seat.isRunning || !seat.isPaused) return;
            seat.endTime = Date.now() + seat.remainingMs;
            seat.startTime = seat.endTime - (seat.initialDuration * 60000);
            seat.isPaused = false;
            saveState(); renderWorkspaceCard(seat); updateStatsSummary(); triggerMobileVibration([150,50]);
        }

        function stopSeatSession(seatId) {
            const seat = seats.find(s => s.id === seatId); if (!seat) return;
            stopAudioAlert(seatId);
            seat.isRunning = false; seat.startTime = null; seat.endTime = null; seat.alarmState = 'none'; seat.isPaused = false; seat.remainingMs = 0;
            saveState(); renderWorkspaceCard(seat); updateStatsSummary();
            showToast(`🛑 ${seat.name} time completely cleared.`, "info");
        }

        function updateStatsSummary() {
            let active = 0, warns = 0, dangerAlerts = 0;
            seats.forEach(seat => {
                if (seat.isRunning) { active++; if (seat.alarmState === 'warning') warns++; if (seat.alarmState === 'danger') dangerAlerts++; }
            });
            document.getElementById('activeCounter').innerText = active;
            document.getElementById('warningCounter').innerText = warns;
            document.getElementById('alarmCounter').innerText = dangerAlerts;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let clr = "bg-black/80 border-slate-700 text-slate-100"; let icon = "fa-solid fa-circle-info text-blue-400";
            if (type === 'success') { clr = "bg-green-950/80 border-green-500/50 text-green-100"; icon = "fa-solid fa-check text-green-400"; }
            else if (type === 'warning') { clr = "bg-yellow-950/80 border-yellow-500/50 text-yellow-100"; icon = "fa-solid fa-triangle-exclamation text-yellow-400"; }
            else if (type === 'danger') { clr = "bg-red-950/80 border-red-500/50 text-red-100"; icon = "fa-solid fa-bolt text-red-400"; }

            toast.className = `p-4 rounded-2xl border flex items-center gap-3 shadow-[0_10px_30px_rgba(0,0,0,0.8)] backdrop-blur-md transition-all duration-300 transform translate-y-5 opacity-0 ${clr}`;
            toast.innerHTML = `<div class="text-sm"><i class="${icon}"></i></div><div class="flex-grow text-[11px] font-bold leading-relaxed tracking-wider uppercase">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-5', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); }, 50);
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-5', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }
    </script>
</body>
</html>
